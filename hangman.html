<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --text: #e8eaed;
      --muted: #8b919a;
      --accent-win: #6ee7b7;
      --accent-lose: #f87171;
      --btn: #252a36;
      --btn-hover: #2f3545;
      --radius: 12px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-base {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #1a2236 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 100%, #141c28 0%, transparent 50%),
        linear-gradient(165deg, #080a10 0%, #0f1117 40%, #0a0e18 100%);
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      will-change: transform;
    }

    .bg-orb--1 {
      width: 420px;
      height: 420px;
      top: -8%;
      left: -6%;
      background: radial-gradient(circle, #3d5a80 0%, transparent 70%);
      animation: drift1 22s ease-in-out infinite;
    }

    .bg-orb--2 {
      width: 360px;
      height: 360px;
      bottom: -5%;
      right: -4%;
      background: radial-gradient(circle, #2d6a5a 0%, transparent 70%);
      animation: drift2 26s ease-in-out infinite;
    }

    .bg-orb--3 {
      width: 280px;
      height: 280px;
      top: 45%;
      left: 55%;
      background: radial-gradient(circle, #5c4d7a 0%, transparent 70%);
      animation: drift3 19s ease-in-out infinite;
    }

    .bg-mesh {
      position: absolute;
      inset: 0;
      background:
        conic-gradient(from 220deg at 30% 20%, rgba(110, 231, 183, 0.06), transparent 35%),
        conic-gradient(from 40deg at 75% 70%, rgba(96, 165, 250, 0.07), transparent 40%),
        conic-gradient(from 180deg at 50% 50%, rgba(248, 113, 113, 0.04), transparent 45%);
      animation: meshRotate 60s linear infinite;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 45%, black 20%, transparent 75%);
    }

    .bg-noise {
      position: absolute;
      inset: 0;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, 0.55) 100%);
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(6%, 8%) scale(1.08); }
      66% { transform: translate(3%, -4%) scale(0.95); }
    }

    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-8%, -6%) scale(1.1); }
    }

    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0); }
      40% { transform: translate(-12%, 6%); }
      80% { transform: translate(5%, -8%); }
    }

    @keyframes meshRotate {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-orb, .bg-mesh { animation: none; }
    }

    .game {
      width: 100%;
      max-width: 720px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-shadow: 0 0 40px rgba(110, 231, 183, 0.15);
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      background: rgba(26, 29, 39, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .figure-panel {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .figure-panel svg {
      width: 100%;
      max-width: 220px;
      height: auto;
    }

    .figure-panel svg [data-stage] {
      opacity: 0;
      transform-origin: center;
      transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
      transform: scale(0.85);
    }

    .figure-panel svg [data-stage].visible {
      opacity: 1;
      transform: scale(1);
    }

    .figure-panel svg .gallows {
      opacity: 1;
    }

    .figure-panel svg .laser-beam {
      animation: laserPulse 1.8s ease-in-out infinite;
    }

    @keyframes laserPulse {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .figure-panel svg .laser-beam {
        animation: none;
        opacity: 0.9;
      }
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #word-display {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-align: center;
      min-height: 2.5rem;
    }

    #word-display.reveal-answer {
      color: var(--accent-lose);
      letter-spacing: 0.2em;
    }

    #word-display.win {
      color: var(--accent-win);
    }

    #wrong-counter {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
    }

    #wrong-counter.danger {
      color: var(--accent-lose);
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: 0.5rem;
    }

    .keyboard button {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      background: rgba(37, 42, 54, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .keyboard button:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: translateY(-2px);
    }

    .keyboard button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .keyboard button.correct {
      border-color: var(--accent-win);
      opacity: 0.7;
    }

    .keyboard button.wrong {
      border-color: var(--accent-lose);
      opacity: 0.7;
    }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      border-radius: var(--radius);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .overlay.show {
      display: flex;
    }

    .overlay-card {
      background: rgba(26, 29, 39, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      text-align: center;
      max-width: 90%;
    }

    .overlay-card h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .overlay-card.win h2 {
      color: var(--accent-win);
    }

    .overlay-card.lose h2 {
      color: var(--accent-lose);
    }

    .overlay-card p {
      color: var(--muted);
      margin-bottom: 1.5rem;
      font-size: 1.05rem;
    }

    .overlay-card p strong {
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    #restart-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      background: var(--accent-win);
      color: var(--bg);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    #restart-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    @media (prefers-reduced-motion: reduce) {
      .figure-panel svg [data-stage] {
        transition: opacity 0.2s ease;
        transform: none;
      }
      .figure-panel svg [data-stage].visible {
        transform: none;
      }
    }

    @media (max-width: 560px) {
      .board {
        grid-template-columns: 1fr;
      }

      .keyboard {
        grid-template-columns: repeat(7, 1fr);
      }

      #word-display {
        font-size: 1.35rem;
        letter-spacing: 0.25em;
      }
    }
  </style>
</head>
<body>
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-base"></div>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="bg-noise"></div>
    <div class="bg-vignette"></div>
  </div>

  <div class="game">
    <header>
      <h1>HANGMAN</h1>
    </header>

    <div class="board">
      <div class="figure-panel" aria-hidden="true">
        <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6ee7b7"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
            <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#353b4a"/>
              <stop offset="100%" stop-color="#1e222d"/>
            </linearGradient>
            <linearGradient id="visorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
            </linearGradient>
            <linearGradient id="ironH" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#4a5159"/>
              <stop offset="12%" stop-color="#9aa5b3"/>
              <stop offset="28%" stop-color="#e8edf2"/>
              <stop offset="42%" stop-color="#b8c2cc"/>
              <stop offset="58%" stop-color="#6d7680"/>
              <stop offset="75%" stop-color="#a3adb8"/>
              <stop offset="90%" stop-color="#5a626c"/>
              <stop offset="100%" stop-color="#3d444c"/>
            </linearGradient>
            <linearGradient id="ironV" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#525a63"/>
              <stop offset="15%" stop-color="#c5cdd6"/>
              <stop offset="32%" stop-color="#eef2f6"/>
              <stop offset="48%" stop-color="#8e98a3"/>
              <stop offset="65%" stop-color="#5e6771"/>
              <stop offset="82%" stop-color="#9da7b1"/>
              <stop offset="100%" stop-color="#404850"/>
            </linearGradient>
            <linearGradient id="ironCap" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#b0bac4"/>
              <stop offset="50%" stop-color="#6e7882"/>
              <stop offset="100%" stop-color="#3a4149"/>
            </linearGradient>
            <linearGradient id="laserGrad" gradientUnits="userSpaceOnUse" x1="140" y1="30" x2="140" y2="62">
              <stop offset="0%" stop-color="#6ee7b7"/>
              <stop offset="45%" stop-color="#a7f3d0"/>
              <stop offset="55%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
            <filter id="laserGlow" x="-80%" y="-5%" width="260%" height="110%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <!-- Shiny iron I-beam frame -->
          <g class="gallows">
            <!-- Base plate -->
            <rect x="16" y="226" width="90" height="10" rx="2" fill="url(#ironH)" stroke="#2e343b" stroke-width="1"/>
            <rect x="20" y="228" width="28" height="2" rx="1" fill="#fff" opacity="0.22"/>

            <!-- Vertical I-beam -->
            <rect x="48" y="22" width="16" height="206" rx="1" fill="url(#ironV)" stroke="#2e343b" stroke-width="1"/>
            <rect x="50" y="26" width="3" height="198" rx="1" fill="#fff" opacity="0.28"/>
            <rect x="59" y="26" width="1.5" height="198" fill="#fff" opacity="0.08"/>
            <!-- Vertical flange hints -->
            <rect x="46" y="22" width="3" height="206" fill="#3d444c" opacity="0.5"/>
            <rect x="63" y="22" width="3" height="206" fill="#2a3038" opacity="0.4"/>

            <!-- Horizontal I-beam -->
            <rect x="48" y="18" width="104" height="14" rx="1" fill="url(#ironH)" stroke="#2e343b" stroke-width="1"/>
            <rect x="52" y="20" width="96" height="3" rx="1" fill="#fff" opacity="0.25"/>
            <rect x="48" y="16" width="104" height="3" fill="#3d444c" opacity="0.35"/>
            <rect x="48" y="31" width="104" height="2" fill="#2a3038" opacity="0.3"/>

            <!-- Laser emitter housing -->
            <rect x="132" y="14" width="16" height="10" rx="2" fill="url(#ironCap)" stroke="#2e343b" stroke-width="0.75"/>
            <rect x="136" y="22" width="8" height="6" rx="1" fill="#1e222d" stroke="#6ee7b7" stroke-width="1"/>
            <circle cx="140" cy="25" r="2.5" fill="#6ee7b7" opacity="0.9"/>

            <!-- Laser beam -->
            <g class="laser-beam" filter="url(#laserGlow)">
              <line x1="140" y1="28" x2="140" y2="62" stroke="#6ee7b7" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
              <line x1="140" y1="28" x2="140" y2="62" stroke="url(#laserGrad)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
              <line x1="140" y1="28" x2="140" y2="62" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
              <circle cx="140" cy="62" r="3.5" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.9"/>
              <circle cx="140" cy="62" r="1.5" fill="#fff"/>
            </g>
            <!-- Rivets -->
            <circle cx="54" cy="24" r="1.5" fill="#8e98a3" stroke="#4a5159" stroke-width="0.5"/>
            <circle cx="54" cy="230" r="1.5" fill="#8e98a3" stroke="#4a5159" stroke-width="0.5"/>
            <circle cx="142" cy="24" r="1.5" fill="#8e98a3" stroke="#4a5159" stroke-width="0.5"/>
          </g>

          <!-- Stage 1: Head (visor helmet) -->
          <g data-stage="1" filter="url(#softGlow)">
            <rect x="116" y="62" width="48" height="44" rx="16" fill="url(#suitGrad)" stroke="#4b5563" stroke-width="1.5"/>
            <rect x="122" y="72" width="36" height="14" rx="7" fill="url(#visorGrad)"/>
            <line x1="128" y1="79" x2="136" y2="79" stroke="#0f1117" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <line x1="144" y1="79" x2="152" y2="79" stroke="#0f1117" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <rect x="132" y="94" width="16" height="3" rx="1.5" fill="#6b7280" opacity="0.6"/>
          </g>

          <!-- Stage 2: Body -->
          <g data-stage="2">
            <rect x="118" y="108" width="44" height="48" rx="14" fill="url(#suitGrad)" stroke="#4b5563" stroke-width="1.5"/>
            <rect x="124" y="118" width="32" height="4" rx="2" fill="url(#frameGrad)" opacity="0.85"/>
            <rect x="130" y="128" width="20" height="3" rx="1.5" fill="#4b5563" opacity="0.5"/>
          </g>

          <!-- Stage 3: Left arm -->
          <g data-stage="3">
            <rect x="88" y="112" width="28" height="12" rx="6" fill="url(#suitGrad)" stroke="#4b5563" stroke-width="1.5" transform="rotate(-28 102 118)"/>
            <circle cx="92" cy="132" r="7" fill="#2a2f3a" stroke="#6ee7b7" stroke-width="1.5"/>
          </g>

          <!-- Stage 4: Right arm -->
          <g data-stage="4">
            <rect x="164" y="112" width="28" height="12" rx="6" fill="url(#suitGrad)" stroke="#4b5563" stroke-width="1.5" transform="rotate(28 176 118)"/>
            <circle cx="188" cy="132" r="7" fill="#2a2f3a" stroke="#60a5fa" stroke-width="1.5"/>
          </g>

          <!-- Stage 5: Left leg -->
          <g data-stage="5">
            <rect x="122" y="156" width="14" height="36" rx="7" fill="url(#suitGrad)" stroke="#4b5563" stroke-width="1.5"/>
            <rect x="118" y="188" width="22" height="10" rx="5" fill="#1a1d27" stroke="#6ee7b7" stroke-width="1.5"/>
          </g>

          <!-- Stage 6: Right leg -->
          <g data-stage="6">
            <rect x="144" y="156" width="14" height="36" rx="7" fill="url(#suitGrad)" stroke="#4b5563" stroke-width="1.5"/>
            <rect x="140" y="188" width="22" height="10" rx="5" fill="#1a1d27" stroke="#60a5fa" stroke-width="1.5"/>
          </g>
        </svg>
      </div>

      <div class="info-panel">
        <div id="word-display" aria-live="polite" aria-atomic="true"></div>
        <p id="wrong-counter">Wrong guesses: 0 / 6</p>
      </div>
    </div>

    <div class="keyboard" id="keyboard" role="group" aria-label="Letter keyboard"></div>

    <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
      <div class="overlay-card" id="overlay-card">
        <h2 id="overlay-title"></h2>
        <p id="overlay-message"></p>
        <button type="button" id="restart-btn">Play again</button>
      </div>
    </div>
  </div>

  <script>
    const WORDS = [
      'apple', 'bridge', 'planet', 'python', 'rocket',
      'shadow', 'tiger', 'window', 'yellow', 'guitar',
      'ocean', 'forest', 'castle', 'silver', 'monkey'
    ];
    const MAX_WRONG = 6;
    const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    const state = {
      word: '',
      guessed: new Set(),
      wrongCount: 0,
      status: 'playing'
    };

    const wordDisplay = document.getElementById('word-display');
    const wrongCounter = document.getElementById('wrong-counter');
    const keyboardEl = document.getElementById('keyboard');
    const overlay = document.getElementById('overlay');
    const overlayCard = document.getElementById('overlay-card');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMessage = document.getElementById('overlay-message');
    const restartBtn = document.getElementById('restart-btn');
    const hangmanParts = document.querySelectorAll('[data-stage]');

    function pickWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function initGame() {
      state.word = pickWord();
      state.guessed = new Set();
      state.wrongCount = 0;
      state.status = 'playing';
      render();
    }

    function handleGuess(letter) {
      const lower = letter.toLowerCase();
      if (state.status !== 'playing' || state.guessed.has(lower)) return;

      state.guessed.add(lower);

      if (!state.word.includes(lower)) {
        state.wrongCount++;
      }

      if (isWin()) {
        state.status = 'won';
      } else if (state.wrongCount >= MAX_WRONG) {
        state.status = 'lost';
      }

      render();
    }

    function isWin() {
      const unique = [...new Set(state.word.split(''))];
      return unique.every((ch) => state.guessed.has(ch));
    }

    function render() {
      renderWord();
      renderHangman(state.wrongCount);
      renderCounter();
      renderKeyboard();
      renderOverlay();
    }

    function renderWord() {
      wordDisplay.classList.remove('reveal-answer', 'win');

      if (state.status === 'lost') {
        wordDisplay.textContent = state.word.toUpperCase();
        wordDisplay.classList.add('reveal-answer');
        return;
      }

      const chars = state.word.split('').map((ch) => {
        if (state.guessed.has(ch)) return ch.toUpperCase();
        return '_';
      });
      wordDisplay.textContent = chars.join(' ');

      if (state.status === 'won') {
        wordDisplay.classList.add('win');
      }
    }

    function renderHangman(n) {
      hangmanParts.forEach((part) => {
        const stage = Number(part.dataset.stage);
        part.classList.toggle('visible', stage <= n);
      });
    }

    function renderCounter() {
      wrongCounter.textContent = `Wrong guesses: ${state.wrongCount} / ${MAX_WRONG}`;
      wrongCounter.classList.toggle('danger', state.wrongCount >= MAX_WRONG - 1 && state.status === 'playing');
    }

    function renderKeyboard() {
      keyboardEl.querySelectorAll('button').forEach((btn) => {
        const letter = btn.dataset.letter;
        const lower = letter.toLowerCase();
        const guessed = state.guessed.has(lower);
        const inWord = state.word.includes(lower);

        btn.disabled = guessed || state.status !== 'playing';
        btn.classList.remove('correct', 'wrong');

        if (guessed) {
          btn.classList.add(inWord ? 'correct' : 'wrong');
        }
      });
    }

    function renderOverlay() {
      if (state.status === 'playing') {
        overlay.classList.remove('show');
        return;
      }

      overlay.classList.add('show');
      overlayCard.classList.remove('win', 'lose');

      if (state.status === 'won') {
        overlayCard.classList.add('win');
        overlayTitle.textContent = 'You won!';
        overlayMessage.textContent = `Great job! The word was ${state.word.toUpperCase()}.`;
      } else {
        overlayCard.classList.add('lose');
        overlayTitle.textContent = 'Game over';
        overlayMessage.innerHTML = `The word was: <strong>${state.word.toUpperCase()}</strong>`;
      }
    }

    function buildKeyboard() {
      ALPHABET.split('').forEach((letter) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.letter = letter;
        btn.textContent = letter;
        btn.setAttribute('aria-label', `Guess letter ${letter}`);
        btn.addEventListener('click', () => handleGuess(letter));
        keyboardEl.appendChild(btn);
      });
    }

    restartBtn.addEventListener('click', initGame);

    document.addEventListener('DOMContentLoaded', () => {
      buildKeyboard();
      initGame();
    });
  </script>
</body>
</html>
