<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --text: #e8eaed;
      --muted: #8b919a;
      --accent-win: #6ee7b7;
      --accent-lose: #f87171;
      --btn: #252a36;
      --btn-hover: #2f3545;
      --radius: 12px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .game {
      width: 100%;
      max-width: 720px;
      position: relative;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: 0.15em;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .figure-panel {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .figure-panel svg {
      width: 100%;
      max-width: 220px;
      height: auto;
    }

    .figure-panel svg [data-stage] {
      opacity: 0;
      transform-origin: center;
      transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
      transform: scale(0.85);
    }

    .figure-panel svg [data-stage].visible {
      opacity: 1;
      transform: scale(1);
    }

    .figure-panel svg .gallows {
      opacity: 1;
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #word-display {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-align: center;
      min-height: 2.5rem;
    }

    #word-display.reveal-answer {
      color: var(--accent-lose);
      letter-spacing: 0.2em;
    }

    #word-display.win {
      color: var(--accent-win);
    }

    #wrong-counter {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
    }

    #wrong-counter.danger {
      color: var(--accent-lose);
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: 0.5rem;
    }

    .keyboard button {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      aspect-ratio: 1;
      border: 2px solid transparent;
      border-radius: 8px;
      background: var(--btn);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, border-color 0.15s;
    }

    .keyboard button:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: translateY(-2px);
    }

    .keyboard button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .keyboard button.correct {
      border-color: var(--accent-win);
      opacity: 0.7;
    }

    .keyboard button.wrong {
      border-color: var(--accent-lose);
      opacity: 0.7;
    }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      border-radius: var(--radius);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .overlay.show {
      display: flex;
    }

    .overlay-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      text-align: center;
      max-width: 90%;
    }

    .overlay-card h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .overlay-card.win h2 {
      color: var(--accent-win);
    }

    .overlay-card.lose h2 {
      color: var(--accent-lose);
    }

    .overlay-card p {
      color: var(--muted);
      margin-bottom: 1.5rem;
      font-size: 1.05rem;
    }

    .overlay-card p strong {
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    #restart-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      background: var(--accent-win);
      color: var(--bg);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    #restart-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    @media (prefers-reduced-motion: reduce) {
      .figure-panel svg [data-stage] {
        transition: opacity 0.2s ease;
        transform: none;
      }
      .figure-panel svg [data-stage].visible {
        transform: none;
      }
    }

    @media (max-width: 560px) {
      .board {
        grid-template-columns: 1fr;
      }

      .keyboard {
        grid-template-columns: repeat(7, 1fr);
      }

      #word-display {
        font-size: 1.35rem;
        letter-spacing: 0.25em;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <header>
      <h1>HANGMAN</h1>
    </header>

    <div class="board">
      <div class="figure-panel" aria-hidden="true">
        <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#a67c52"/>
              <stop offset="100%" stop-color="#8b5e3c"/>
            </linearGradient>
          </defs>

          <!-- Cartoon gallows -->
          <g class="gallows">
            <rect x="12" y="228" width="88" height="10" rx="4" fill="url(#woodGrad)" stroke="#5c3d28" stroke-width="1.5"/>
            <rect x="52" y="24" width="12" height="206" rx="4" fill="url(#woodGrad)" stroke="#5c3d28" stroke-width="1.5"/>
            <rect x="52" y="18" width="96" height="12" rx="4" fill="url(#woodGrad)" stroke="#5c3d28" stroke-width="1.5"/>
            <path d="M140 30 Q142 52 140 58" stroke="#c9a87c" stroke-width="3" fill="none" stroke-linecap="round"/>
            <circle cx="140" cy="60" r="3" fill="#c9a87c"/>
          </g>

          <!-- Stage 1: Head -->
          <g data-stage="1">
            <circle cx="140" cy="82" r="26" fill="#ffcc99" stroke="#5c4033" stroke-width="2.5"/>
            <ellipse cx="140" cy="78" rx="24" ry="8" fill="#e8a86a" opacity="0.35"/>
            <circle cx="130" cy="80" r="7" fill="#fff" stroke="#5c4033" stroke-width="1.5"/>
            <circle cx="150" cy="80" r="7" fill="#fff" stroke="#5c4033" stroke-width="1.5"/>
            <circle cx="131" cy="81" r="3" fill="#2d2d2d"/>
            <circle cx="151" cy="81" r="3" fill="#2d2d2d"/>
            <circle cx="132" cy="79" r="1.2" fill="#fff"/>
            <circle cx="152" cy="79" r="1.2" fill="#fff"/>
            <ellipse cx="126" cy="90" rx="4" ry="2.5" fill="#f4a4a4" opacity="0.7"/>
            <ellipse cx="154" cy="90" rx="4" ry="2.5" fill="#f4a4a4" opacity="0.7"/>
            <path d="M132 96 Q140 102 148 96" stroke="#5c4033" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M158 72 Q165 68 168 74" stroke="#5c4033" stroke-width="2" fill="none" stroke-linecap="round"/>
          </g>

          <!-- Stage 2: Body -->
          <g data-stage="2">
            <ellipse cx="140" cy="128" rx="22" ry="28" fill="#4a90d9" stroke="#2d5a8a" stroke-width="2"/>
            <ellipse cx="140" cy="118" rx="18" ry="8" fill="#6aa8e8" opacity="0.5"/>
            <path d="M128 108 L140 100 L152 108" fill="#4a90d9" stroke="#2d5a8a" stroke-width="2" stroke-linejoin="round"/>
          </g>

          <!-- Stage 3: Left arm -->
          <g data-stage="3">
            <ellipse cx="108" cy="122" rx="10" ry="16" fill="#ffcc99" stroke="#5c4033" stroke-width="2" transform="rotate(-35 108 122)"/>
            <circle cx="100" cy="138" r="7" fill="#ffcc99" stroke="#5c4033" stroke-width="2"/>
          </g>

          <!-- Stage 4: Right arm -->
          <g data-stage="4">
            <ellipse cx="172" cy="122" rx="10" ry="16" fill="#ffcc99" stroke="#5c4033" stroke-width="2" transform="rotate(35 172 122)"/>
            <circle cx="180" cy="138" r="7" fill="#ffcc99" stroke="#5c4033" stroke-width="2"/>
          </g>

          <!-- Stage 5: Left leg -->
          <g data-stage="5">
            <ellipse cx="128" cy="168" rx="11" ry="22" fill="#3d5a80" stroke="#2a3f5c" stroke-width="2"/>
            <ellipse cx="126" cy="192" rx="12" ry="6" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="1.5"/>
          </g>

          <!-- Stage 6: Right leg -->
          <g data-stage="6">
            <ellipse cx="152" cy="168" rx="11" ry="22" fill="#3d5a80" stroke="#2a3f5c" stroke-width="2"/>
            <ellipse cx="154" cy="192" rx="12" ry="6" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="1.5"/>
          </g>
        </svg>
      </div>

      <div class="info-panel">
        <div id="word-display" aria-live="polite" aria-atomic="true"></div>
        <p id="wrong-counter">Wrong guesses: 0 / 6</p>
      </div>
    </div>

    <div class="keyboard" id="keyboard" role="group" aria-label="Letter keyboard"></div>

    <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
      <div class="overlay-card" id="overlay-card">
        <h2 id="overlay-title"></h2>
        <p id="overlay-message"></p>
        <button type="button" id="restart-btn">Play again</button>
      </div>
    </div>
  </div>

  <script>
    const WORDS = [
      'apple', 'bridge', 'planet', 'python', 'rocket',
      'shadow', 'tiger', 'window', 'yellow', 'guitar',
      'ocean', 'forest', 'castle', 'silver', 'monkey'
    ];
    const MAX_WRONG = 6;
    const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    const state = {
      word: '',
      guessed: new Set(),
      wrongCount: 0,
      status: 'playing'
    };

    const wordDisplay = document.getElementById('word-display');
    const wrongCounter = document.getElementById('wrong-counter');
    const keyboardEl = document.getElementById('keyboard');
    const overlay = document.getElementById('overlay');
    const overlayCard = document.getElementById('overlay-card');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMessage = document.getElementById('overlay-message');
    const restartBtn = document.getElementById('restart-btn');
    const hangmanParts = document.querySelectorAll('[data-stage]');

    function pickWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function initGame() {
      state.word = pickWord();
      state.guessed = new Set();
      state.wrongCount = 0;
      state.status = 'playing';
      render();
    }

    function handleGuess(letter) {
      const lower = letter.toLowerCase();
      if (state.status !== 'playing' || state.guessed.has(lower)) return;

      state.guessed.add(lower);

      if (!state.word.includes(lower)) {
        state.wrongCount++;
      }

      if (isWin()) {
        state.status = 'won';
      } else if (state.wrongCount >= MAX_WRONG) {
        state.status = 'lost';
      }

      render();
    }

    function isWin() {
      const unique = [...new Set(state.word.split(''))];
      return unique.every((ch) => state.guessed.has(ch));
    }

    function render() {
      renderWord();
      renderHangman(state.wrongCount);
      renderCounter();
      renderKeyboard();
      renderOverlay();
    }

    function renderWord() {
      wordDisplay.classList.remove('reveal-answer', 'win');

      if (state.status === 'lost') {
        wordDisplay.textContent = state.word.toUpperCase();
        wordDisplay.classList.add('reveal-answer');
        return;
      }

      const chars = state.word.split('').map((ch) => {
        if (state.guessed.has(ch)) return ch.toUpperCase();
        return '_';
      });
      wordDisplay.textContent = chars.join(' ');

      if (state.status === 'won') {
        wordDisplay.classList.add('win');
      }
    }

    function renderHangman(n) {
      hangmanParts.forEach((part) => {
        const stage = Number(part.dataset.stage);
        part.classList.toggle('visible', stage <= n);
      });
    }

    function renderCounter() {
      wrongCounter.textContent = `Wrong guesses: ${state.wrongCount} / ${MAX_WRONG}`;
      wrongCounter.classList.toggle('danger', state.wrongCount >= MAX_WRONG - 1 && state.status === 'playing');
    }

    function renderKeyboard() {
      keyboardEl.querySelectorAll('button').forEach((btn) => {
        const letter = btn.dataset.letter;
        const lower = letter.toLowerCase();
        const guessed = state.guessed.has(lower);
        const inWord = state.word.includes(lower);

        btn.disabled = guessed || state.status !== 'playing';
        btn.classList.remove('correct', 'wrong');

        if (guessed) {
          btn.classList.add(inWord ? 'correct' : 'wrong');
        }
      });
    }

    function renderOverlay() {
      if (state.status === 'playing') {
        overlay.classList.remove('show');
        return;
      }

      overlay.classList.add('show');
      overlayCard.classList.remove('win', 'lose');

      if (state.status === 'won') {
        overlayCard.classList.add('win');
        overlayTitle.textContent = 'You won!';
        overlayMessage.textContent = `Great job! The word was ${state.word.toUpperCase()}.`;
      } else {
        overlayCard.classList.add('lose');
        overlayTitle.textContent = 'Game over';
        overlayMessage.innerHTML = `The word was: <strong>${state.word.toUpperCase()}</strong>`;
      }
    }

    function buildKeyboard() {
      ALPHABET.split('').forEach((letter) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.letter = letter;
        btn.textContent = letter;
        btn.setAttribute('aria-label', `Guess letter ${letter}`);
        btn.addEventListener('click', () => handleGuess(letter));
        keyboardEl.appendChild(btn);
      });
    }

    restartBtn.addEventListener('click', initGame);

    document.addEventListener('DOMContentLoaded', () => {
      buildKeyboard();
      initGame();
    });
  </script>
</body>
</html>
